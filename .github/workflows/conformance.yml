name: Conformance Tests

# OIDF conformance suite. Pulls the conformance suite images (MongoDB + Java
# server + nginx) via testcontainers and drives the credo-ts verifier against
# them. Only runs on changes to the core and openid4vc packages since it is
# heavy and only exercises those modules.
on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/core/**'
      - 'packages/openid4vc/**'
  push:
    branches:
      - main
    paths:
      - 'packages/core/**'
      - 'packages/openid4vc/**'

env:
  NODE_OPTIONS: --max_old_space_size=6144

concurrency:
  # Cancel previous runs that are not completed yet
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  conformance-tests:
    runs-on: ubuntu-24.04
    name: Conformance Tests

    steps:
      - uses: actions/checkout@v7.0.0

      # The OIDF conformance suite runs in testcontainers and reaches the
      # credo-ts verifier on the host via this alias.
      - name: Add testcontainers host alias
        run: echo "127.0.0.1 host.testcontainers.internal" | sudo tee -a /etc/hosts

      - name: Setup NodeJS
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v6

      # See https://github.com/actions/setup-node/issues/641#issuecomment-1358859686
      - name: pnpm cache path
        id: pnpm-cache-path
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache-path.outputs.STORE_PATH }}
          key: ${{ runner.os }}-${{ steps.setup-node.outputs.node-version }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ steps.setup-node.outputs.node-version }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run OIDF conformance tests
        env:
          TESTCONTAINERS_HOST_OVERRIDE: host.testcontainers.internal
        run: pnpm test:conformance

      - uses: actions/upload-artifact@v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: oidf-conformance-logs
          path: tmp/oidf/logs
          if-no-files-found: ignore
          overwrite: true
